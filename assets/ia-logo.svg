<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Estudos sobre IA</title>
  <desc id="desc">Ícone com as letras IA e um circuito orbital em tons de azul e violeta.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#132642"/>
      <stop offset="0.55" stop-color="#0a1329"/>
      <stop offset="1" stop-color="#211044"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.48" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#9333ea"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="28" y="28" width="456" height="456" rx="112" fill="url(#panel)" stroke="url(#accent)" stroke-width="4"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="url(#accent)" stroke-width="13" stroke-linecap="round" stroke-dasharray="760 215" transform="rotate(-38 256 256)" filter="url(#glow)"/>
  <circle cx="386" cy="167" r="17" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="138" cy="357" r="17" fill="#7c3aed" filter="url(#glow)"/>
  <path d="M190 185v142" fill="none" stroke="url(#accent)" stroke-width="34" stroke-linecap="round"/>
  <path d="M246 327l60-142 60 142M270 276h72" fill="none" stroke="url(#accent)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="306" cy="344" r="11" fill="#7c3aed"/>
</svg>